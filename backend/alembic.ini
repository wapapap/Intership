# ==============================================================================
# Alembic 数据库迁移配置文件
# ==============================================================================
# 配置说明：
#   [alembic]       - 核心配置：迁移脚本位置、数据库连接等
#   [post_write_hooks] - 迁移脚本生成后自动执行的钩子（如代码格式化）
#   [loggers]       - 日志配置

# ======================== 核心配置 ========================
[alembic]

# 迁移脚本存放目录（相对于此配置文件的位置）
script_location = alembic

# 迁移脚本文件名模板
# 默认格式：{revision}_{slug}.py
# 如需带时间戳，取消下面注释：
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 添加到 sys.path 的路径，用于导入项目模块
prepend_sys_path = .

# 迁移脚本和文件名中日期的时区设置
# 如需使用，取消注释并设置时区（如 Asia/Shanghai）
# timezone =

# "slug" 字段的最大长度（迁移脚本文件名中的描述部分）
# truncate_slug_length = 40

# 是否在 revision 命令时运行环境（即使没有 --autogenerate）
# revision_environment = false

# 是否允许没有 .py 源文件的 .pyc/.pyo 文件作为迁移版本
# sourceless = false

# 版本文件存放位置（支持多个目录，用分隔符分隔）
# 默认使用 alembic/versions
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# 版本路径分隔符（用于 version_locations）
# os 表示使用操作系统默认分隔符（Linux/macOS 用 :，Windows 用 ;）
version_path_separator = os

# 是否递归搜索版本目录中的源文件（Alembic 1.10+）
# recursive_version_locations = false

# 迁移脚本输出编码
 output_encoding = utf-8

# ======================== 数据库连接 ========================
# 格式：postgresql://用户名:密码@主机:端口/数据库名
# 注意：生产环境建议通过环境变量覆盖此配置，避免硬编码密码
sqlalchemy.url = postgresql://zqs:zqs@localhost:5432/zqs


# ======================== 后置钩子 ========================
# 在生成迁移脚本后自动执行的操作（如代码格式化、lint 检查）
[post_write_hooks]

# 示例：使用 black 格式化代码
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# 示例：使用 ruff 进行 lint 检查
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME


# ======================== 日志配置 ========================
[loggers]
# 日志器列表：root（根日志器）、sqlalchemy、alembic
keys = root,sqlalchemy,alembic

[handlers]
# 日志处理器：console（控制台输出）
keys = console

[formatters]
# 日志格式化器：generic（通用格式）
keys = generic

# 根日志器配置
[logger_root]
level = WARN
handlers = console
qualname =

# SQLAlchemy 日志器配置
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

# Alembic 日志器配置
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# 控制台处理器配置
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = DEBUG
formatter = generic

# 通用格式化器配置
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S